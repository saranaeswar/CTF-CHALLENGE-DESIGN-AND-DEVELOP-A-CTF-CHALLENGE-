<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeskVault Support Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel">
    <h1>DeskVault Support</h1>
    <p class="muted">Internal ticket portal. Analysts only.</p>

    <form id="loginForm">
      <label>Username <input id="user" autocomplete="username" /></label>
      <label>Password <input id="pass" type="password" autocomplete="current-password" /></label>
      <button type="submit">Sign in</button>
    </form>

    <section id="dashboard" hidden>
      <h2>Analyst Dashboard</h2>
      <p>Welcome back. Emergency access mode is enabled.</p>
      <div class="ticket">
        <strong>Priority Ticket #1042</strong>
        <p id="flagLine"></p>
      </div>
    </section>

    <p id="message" class="message"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
