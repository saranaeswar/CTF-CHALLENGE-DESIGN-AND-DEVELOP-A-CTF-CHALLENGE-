<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeskVault Support Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel">
    <h1>DeskVault Support</h1>
    <p class="muted">Internal ticket portal. Analysts only.</p>

    <form id="loginForm">
      <label>Username <input id="user" autocomplete="username" /></label>
      <label>Password <input id="pass" type="password" autocomplete="current-password" /></label>
      <button type="submit">Sign in</button>
    </form>

    <!-- CTF hint: this signup portal is only hidden in the HTML. -->
    <button id="openSignup" class="secondary" hidden>Open signup portal</button>

    <p id="message" class="message"></p>
  </main>

  <section id="signupOverlay" class="overlay" hidden>
    <form id="signupForm" class="panel portal">
      <h2>DeskVault Signup</h2>
      <p class="muted">Emergency analyst registration</p>
      <label>New username <input id="newUser" /></label>
      <label>New password <input id="newPass" type="password" /></label>
      <button type="submit">Sign up</button>
    </form>
  </section>

  <section id="verification" class="panel" hidden>
    <h2>Verification Portal</h2>
    <p>New analyst account verified.</p>
    <div class="ticket">
      <strong>CTF Flag</strong>
      <p id="flagLine"></p>
    </div>
  </section>
  <script src="app.js"></script>
</body>
</html>
